@if (preloaderService.display() && display()) {
  @if (preloaderService.isLoading()) {

    <div class="preloader">
      <div class="status">

        <div class="preloader-spinner" role="status"></div>

        <div class="text-muted text-center">
          {{ preloaderService.message() }}
        </div>

      </div>
    </div>

  }
}
